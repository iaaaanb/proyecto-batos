<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><title>CASEN 2024 — Grupo 6</title>
<style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
           max-width: 980px; margin: 2rem auto; padding: 0 1.5rem;
           color: #1a1a2e; line-height: 1.5; }
    h1 { color: #0d3b66; border-bottom: 3px solid #0d3b66; padding-bottom: .4rem; }
    h2 { color: #3d5a80; font-weight: 600; margin-top: 1.6rem; }
    a { color: #0d3b66; }
    p { color: #444; }
    form { background: #f1f4f8; padding: 1rem 1.2rem; border-radius: 8px;
           margin: 1.2rem 0; display: inline-block; }
    label { font-weight: 600; margin-right: .5rem; }
    select, button { padding: .45rem .6rem; font-size: 1rem; border-radius: 6px;
                     border: 1px solid #b0bec5; }
    button { background: #0d3b66; color: #fff; border: none; cursor: pointer;
             margin-left: .4rem; }
    button:hover { background: #14507f; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem;
            font-variant-numeric: tabular-nums; }
    th { background: #0d3b66; color: #fff; text-align: left; padding: .6rem .7rem; }
    td { padding: .5rem .7rem; border-bottom: 1px solid #e0e0e0; }
    tr:nth-child(even) td { background: #f7f9fb; }
    tr:hover td { background: #eef3f8; }
    /* alinear números a la derecha (todas las columnas menos la primera) */
    td:not(:first-child) { text-align: right; }
</style>
</head>
<body>
    <h1>Análisis del mercado laboral — CASEN 2024</h1>
    <p>Grupo 6 · Consultas:</p>
    <ul>
        <li><a href="{% url 'consultas:distribucion_rama' %}">Distribución de ingreso por rama económica</a></li>
        <li><a href="{% url 'consultas:indicadores' %}">Indicadores laborales por región</a></li>
        <li><a href="{% url 'consultas:brecha' %}">Brecha salarial por sexo (por región)</a></li>
    </ul>
</body>
</html>
